<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
<script type="text/javascript">
  (function (location_) {
    if (location_.search[1] === "/") {
      let decoded = location_.search.slice(1).split("&").map(function (s) {
        return s.replace(/~and~/g, "&");
      }).join("?");
      window.history.replaceState(null, null, location_.pathname.slice(0, -1) + decoded + location_.hash);
    }
  })(window.location);
</script>
</body>
</html>
